name: chapri
description: "A new Flutter project."
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  intl: ^0.20.3
  youtube_player_flutter: ^10.0.1
  http: ^1.3.0
  flutter_inappwebview: ^6.1.15
  image_picker: ^1.1.2
  firebase_storage: ^12.3.2
  shared_preferences: ^2.3.2
  
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.10.0

# Konfigurasi untuk flutter_launcher_icons (level root)
flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  # Jika ingin adaptive Android, uncomment dan sediakan file:
  # adaptive_icon_background: "assets/icons/ic_background.png"
  # adaptive_icon_foreground: "assets/icons/ic_foreground.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icons/app_icon.png
    # Jika menggunakan adaptive icon, daftarkan juga:
    # - assets/icons/ic_foreground.png
    # - assets/icons/ic_background.png


